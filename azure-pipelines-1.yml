pool:
  vmImage: 'ubuntu-latest'

variables:
  NPM_CONFIG_AUDIT: true
  NODE_OPTIONS: "--no-deprecation"

steps:

# ── Secret scanning — เช็คก่อนว่ามี password/key หลุดเข้า git history ไหม
- bash: |
    GL=8.21.2
    curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
    /tmp/gitleaks detect --source . --redact --verbose --exit-code 0
  displayName: "Secret scan (gitleaks) [report-only]"

# ── CodeQL Init ──
- task: AdvancedSecurity-Codeql-Init@1
  displayName: "Initialize CodeQL"
  inputs:
    enableAutomaticCodeQLInstall: true
    languages: 'javascript'
    buildtype: 'none'
    config: |
      queries:
        - uses: security-extended
        - uses: security-and-quality
      paths-ignore:
        - node_modules
        - .next
        - prisma/migrations

- task: NodeTool@0
  displayName: "Use Node.js 22"
  inputs:
    versionSpec: '22.x'

- bash: |
    npm ci
    npm audit --audit-level=high || true
  displayName: "Secure Install"

- bash: |
    npx tsc --noEmit
  displayName: "Type Check [blocking]"

- bash: |
    npm run lint || true
  displayName: "ESLint [report-only]"

# ── CodeQL Analyze ──
- task: AdvancedSecurity-Codeql-Analyze@1
  displayName: "Run CodeQL Analysis"
  inputs:
    checkers: 'strict'

- task: AdvancedSecurity-Publish@1
  displayName: "Publish CodeQL Results"